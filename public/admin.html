<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
  .stats {
  display: flex;
  justify-content: space-around;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  width: 25%;
  text-align: center;
  border: 1px solid gold;
}

.card h2 {
  color: gold;
}
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

#loginBox {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#loginBox input {
  padding: 12px;
  width: 250px;
  border: none;
  border-radius: 8px;
  margin: 10px;
}

#loginBox button {
  padding: 12px 20px;
  background: gold;
  border: none;

  font-weight: bold;

}

.header {
  background: #111;
  padding: 20px;

  border-bottom: 2px solid gold;
}

.header h1 {
  color: gold;
}

table {
  width: 95%;
  margin: 20px auto;
  border-collapse: collapse;

}

th, td {
  padding: 12px;

  text-align: center;

  background: gold;

  background: gold;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 5px;
  font-weight: bold;

  background: orange;

</style>
</head>

<body>

<div id="loginBox">
  <h2>🔥 FIRE VAULT ADMIN LOGIN</h2>
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">

  <div class="header">
    <h1>🔥 FIRE VAULT DASHBOARD</h1>
  </div>

<div class="stats">

  <div class="card">
    <h2 id="totalOrders">0</h2>
    <p>Total Orders</p>
  </div>

  <div class="card">
    <h2 id="pendingOrders">0</h2>
    <p>Pending</p>
  </div>

  <div class="card">
    <h2 id="totalRevenue">₦0</h2>
    <p>Total Revenue</p>
  </div>

</div>
  
  <table>
    <thead>
      <tr>
        <th>Player ID</th>
        <th>Package</th>
        <th>Amount</th>
        <th>Reference</th>
        <th>Time</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="ordersTable"></tbody>
  </table>

</div>

<script>

const ADMIN_PASSWORD = "1234";

function login() {
  let input = document.getElementById("password").value;

  if(input === ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadOrders();
  } else {
    alert("Wrong password");
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyDnwV4nIVyl1roL2jtgc1_YLcvyYCGKj2Y",
  authDomain: "fire-vault-22555.firebaseapp.com",
  projectId: "fire-vault-22555",
  storageBucket: "fire-vault-22555.firebasestorage.app",
  messagingSenderId: "589168743870",
  appId: "1:589168743870:web:38210ca30165a196d515ef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadOrders() {

document.getElementById("totalOrders").innerText = total;
document.getElementById("pendingOrders").innerText = pending;
document.getElementById("totalRevenue").innerText = "₦" + revenue;
  
  db.collection("orders")
    .orderBy("time", "desc")
    .onSnapshot((snapshot) => {

      let table = document.getElementById("ordersTable");
      table.innerHTML = "";

      snapshot.forEach((doc) => {
        let order = doc.data();

total++;
  revenue += Number(order.amount);

  if(order.status !== "Delivered"){
    pending++;
  }
        
        table.innerHTML += `
          <tr>
            <td>${order.playerId}</td>
            <td>${order.package}</td>
            <td>₦${order.amount}</td>
            <td>${order.reference}</td>
            <td>${new Date(order.time).toLocaleString()}</td>
            <td>${order.status || "Pending"}</td>
            <td>
              <button onclick="markDelivered('${doc.id}')">
                Mark Delivered
              </button>
            </td>
          </tr>
        `;
      });

    });

}

function markDelivered(id){
  db.collection("orders").doc(id).update({
    status: "Delivered"
  });
}

</script>

</body>
</html>
