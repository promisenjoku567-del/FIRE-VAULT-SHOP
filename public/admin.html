<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="logo.png?v=3">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIRE VAULT ADMIN</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

#loginBox {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#loginBox input {
  padding: 12px;
  width: 250px;
  margin: 10px;
  border: none;
  border-radius: 8px;
}

#loginBox button {
  padding: 12px 20px;
  background: gold;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.header {
  background: #111;
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid gold;
}

.header h1 {
  color: gold;
}

.stats {
  display: flex;
  justify-content: space-around;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  width: 25%;
  text-align: center;
  border: 1px solid gold;
}

.card h2 {
  color: gold;
}

table {
  width: 95%;
  margin: 20px auto;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 12px;
  border: 1px solid #222;
  text-align: center;
}

th {
  background: gold;
  color: black;
}

button {
  background: gold;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: orange;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔥 FIRE VAULT ADMIN LOGIN</h2>
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <div class="header">
    <h1>🔥 FIRE VAULT DASHBOARD</h1>
  </div>

  <div class="stats">
    <div class="card">
      <h2 id="totalOrders">0</h2>
      <p>Total Orders</p>
    </div>

    <div class="card">
      <h2 id="pendingOrders">0</h2>
      <p>Pending</p>
    </div>

    <div class="card">
      <h2 id="totalRevenue">₦0</h2>
      <p>Total Revenue</p>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Player ID</th>
        <th>Package</th>
        <th>Amount</th>
        <th>Reference</th>
        <th>Time</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="ordersTable"></tbody>
  </table>

</div>

<script>

const ADMIN_PASSWORD = "1234";

function login() {
  let input = document.getElementById("password").value;

  if (input === ADMIN_PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadOrders();
  } else {
    alert("Wrong password");
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyDnwV4nIVyl1roL2jtgc1_YLcvyYCGKj2Y",
  authDomain: "fire-vault-22555.firebaseapp.com",
  projectId: "fire-vault-22555",
  storageBucket: "fire-vault-22555.firebasestorage.app",
  messagingSenderId: "589168743870",
  appId: "1:589168743870:web:38210ca30165a196d515ef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let lastOrderCount = 0;

function loadOrders() {

  db.collection("orders")
    .orderBy("time", "desc")
    .onSnapshot((snapshot) => {

      let table = document.getElementById("ordersTable");
      table.innerHTML = "";

      let total = 0;
      let pending = 0;
      let revenue = 0;

      let currentCount = snapshot.size;

      snapshot.forEach((doc) => {
        let order = doc.data();

        total++;
        revenue += Number(order.amount);

        if (order.status !== "Delivered") {
          pending++;
        }

        table.innerHTML += `
          <tr>
            <td>${order.playerId}</td>
            <td>${order.package}</td>
            <td>₦${order.amount}</td>
            <td>${order.reference}</td>
            <td>${new Date(order.time).toLocaleString()}</td>
            <td>${order.status || "Pending"}</td>
            <td>
              <button onclick="markDelivered('${doc.id}')">
                Mark Delivered
              </button>
            </td>
          </tr>
        `;
      });

      document.getElementById("totalOrders").innerText = total;
      document.getElementById("pendingOrders").innerText = pending;
      document.getElementById("totalRevenue").innerText = "₦" + revenue;

      // 🔔 SOUND ALERT
      if (lastOrderCount !== 0 && currentCount > lastOrderCount) {
        let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
        audio.play();
      }

      lastOrderCount = currentCount;

    });

}

function markDelivered(id) {
  db.collection("orders").doc(id).update({
    status: "Delivered"
  });
}

</script>

</body>
</html>
